simulation:
  orders: 500           # Number of orders to simulate
  seed: 42              # Optional base seed; --seed overrides this

arrival:
  distribution: exponential
  rate: 2.0             # Orders per hour

order:
  page_count:
    distribution: discrete
    values: [100, 200, 300, 400]
    weights: [0.3, 0.4, 0.2, 0.1]
  units:
    distribution: uniform_int
    min: 100
    max: 500
  book_types: [A, B, C]
  priority_range: [1, 5]

lots:
  books_per_lot: 50

stages:
  printing:
    machines: 3
    processing_time:
      distribution: exponential
      mean: 2.0
    setup_time: 0.5
    energy_rate: 10.0
    operating_windows:
      - [0, 24]         # Use [8, 20] for restricted daytime operation
    failure:
      mtbf: 40.0
      repair_time:
        distribution: exponential
        mean: 2.0

  binding:
    machines: 2
    processing_time:
      distribution: exponential
      mean: 1.5
    setup_time: 0.3
    energy_rate: 8.0
    operating_windows:
      - [0, 24]
    failure:
      mtbf: 60.0
      repair_time:
        distribution: exponential
        mean: 1.5

  qa:
    machines: 1
    processing_time:
      distribution: uniform
      min: 0.5
      max: 1.5
    setup_time: 0.0
    energy_rate: 2.0
    operating_windows:
      - [0, 24]
    defect_probability: 0.05
    defect_threshold: 0.05
    failure:
      mtbf: 100.0
      repair_time:
        distribution: exponential
        mean: 1.0

  packaging:
    machines: 2
    processing_time:
      distribution: normal
      mean: 0.8
      std: 0.1
    setup_time: 0.2
    energy_rate: 5.0
    operating_windows:
      - [0, 24]
    failure:
      mtbf: 80.0
      repair_time:
        distribution: exponential
        mean: 1.0

  dispatch:
    threshold: 20

maintenance:
  frequency: 80.0
  durations:
    printing: 3.0
    binding: 2.0
    qa: 1.0
    packaging: 1.5

sequencing:
  policy: FIFO          # FIFO | PRIORITY | BOOK_TYPE

output:
  event_log: false
  format: json          # json | csv | both
